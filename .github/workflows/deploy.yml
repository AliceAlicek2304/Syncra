name: Deploy to VPS

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Build Frontend
        run: |
          cd fe
          npm ci
          npm run build

      - name: Copy frontend
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "fe/dist/"
          target: "/var/www/Syncra/frontend/"
          strip_components: 1

      - name: Copy deploy files
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "deploy/docker-compose.yml"
          target: "/var/www/Syncra/deploy/"
          strip_components: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: tai-isme
          password: ${{ secrets.GHCR_PAT }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/Dockerfile
          push: true
          tags: |
            ghcr.io/tai-isme/syncra-api:latest
            ghcr.io/tai-isme/syncra-api:${{ github.sha }}

      - name: Deploy backend via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            cd /var/www/Syncra

            echo "Pulling latest image..."
            docker compose -f deploy/docker-compose.yml pull backend

            echo "Restarting backend (keeping Redis)..."
            docker compose -f deploy/docker-compose.yml up -d --no-deps backend

            echo "Waiting for health check..."
            for i in 1 2 3 4 5; do
              if curl -sf http://localhost:5000/health > /dev/null 2>&1; then
                echo "Health check passed!"
                break
              fi
              echo "Attempt $i/5 - not ready yet"
              sleep 3
              if [ "$i" = "5" ]; then
                echo "FAILED health check"
                docker logs syncra-backend --tail 30
                exit 1
              fi
            done

            docker image prune -f
            echo "Deploy complete!"
