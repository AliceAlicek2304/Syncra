name: Deploy to VPS

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: fe/package-lock.json

      - name: Build Frontend
        run: |
          cd fe
          npm ci
          npm run build

      - name: Prepare SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/syncra_deploy_key
          chmod 600 ~/.ssh/syncra_deploy_key
          ssh-keyscan -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Copy frontend
        run: |
          set -e
          for attempt in 1 2 3 4 5; do
            if tar -C fe/dist -czf - . | ssh \
              -i ~/.ssh/syncra_deploy_key \
              -o BatchMode=yes \
              -o ConnectTimeout=30 \
              -o ServerAliveInterval=15 \
              -o ServerAliveCountMax=4 \
              "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" \
              'mkdir -p /var/www/Syncra/frontend && rm -rf /var/www/Syncra/frontend/* && tar -xzf - -C /var/www/Syncra/frontend'; then
              exit 0
            fi
            echo "Frontend copy attempt ${attempt}/5 failed; retrying..."
            sleep $((attempt * 10))
          done
          exit 1

      - name: Copy deploy files
        run: |
          set -e
          for attempt in 1 2 3 4 5; do
            if tar -C deploy -czf - docker-compose.yml | ssh \
              -i ~/.ssh/syncra_deploy_key \
              -o BatchMode=yes \
              -o ConnectTimeout=30 \
              -o ServerAliveInterval=15 \
              -o ServerAliveCountMax=4 \
              "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" \
              'mkdir -p /var/www/Syncra/deploy && tar -xzf - -C /var/www/Syncra/deploy'; then
              exit 0
            fi
            echo "Deploy file copy attempt ${attempt}/5 failed; retrying..."
            sleep $((attempt * 10))
          done
          exit 1

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: tai-isme
          password: ${{ secrets.GHCR_PAT }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/Dockerfile
          push: true
          tags: |
            ghcr.io/tai-isme/syncra-api:latest
            ghcr.io/tai-isme/syncra-api:${{ github.sha }}

      - name: Deploy backend via SSH
        run: |
          set -e
          for attempt in 1 2 3 4 5; do
            if ssh \
              -i ~/.ssh/syncra_deploy_key \
              -o BatchMode=yes \
              -o ConnectTimeout=30 \
              -o ServerAliveInterval=15 \
              -o ServerAliveCountMax=4 \
              "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" <<'EOF'
            set -e
            cd /var/www/Syncra

            echo "Pulling latest image..."
            docker compose -f deploy/docker-compose.yml pull backend

            echo "Restarting backend (keeping Redis)..."
            docker compose -f deploy/docker-compose.yml up -d --no-deps backend

            echo "Waiting for health check..."
            for i in 1 2 3 4 5; do
              if curl -sf http://localhost:5000/health > /dev/null 2>&1; then
                echo "Health check passed!"
                break
              fi
              echo "Attempt $i/5 - not ready yet"
              sleep 3
              if [ "$i" = "5" ]; then
                echo "FAILED health check"
                docker logs syncra-backend --tail 30
                exit 1
              fi
            done

            docker image prune -f
            echo "Deploy complete!"
          EOF
            then
              exit 0
            fi
            echo "Backend deploy attempt ${attempt}/5 failed; retrying..."
            sleep $((attempt * 10))
          done
          exit 1
