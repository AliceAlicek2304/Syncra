name: Deploy to VPS

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Publish Backend
        run: |
          dotnet publish be/src/Syncra.Api/Syncra.Api.csproj \
            -c Release -o backend-publish
          # Ensure wwwroot/uploads exists
          mkdir -p backend-publish/wwwroot/uploads

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Build Frontend
        run: |
          cd fe
          npm ci
          npm run build

      - name: Ensure target directories
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            mkdir -p /var/www/Syncra/backend
            mkdir -p /var/www/Syncra/frontend

      - name: Copy backend
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "backend-publish/"
          target: "/var/www/Syncra/backend/"
          strip_components: 1 

      - name: Copy frontend
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "fe/dist/"
          target: "/var/www/Syncra/frontend/"
          strip_components: 1

      - name: Restart & verify
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            systemctl daemon-reload
            systemctl restart syncra-api || {
              echo "FAILED to restart syncra-api"
              journalctl -u syncra-api --no-pager -n 30
              exit 1
            }

            echo "Waiting for health check..."
            for i in 1 2 3 4 5; do
              if curl -sf http://localhost:5000/health > /dev/null 2>&1; then
                echo "Health check passed!"
                break
              fi
              echo "Attempt $i/5 - not ready yet"
              sleep 3
              if [ "$i" = "5" ]; then
                echo "FAILED health check"
                journalctl -u syncra-api --no-pager -n 50
                exit 1
              fi
            done

            echo "Deploy complete!"
